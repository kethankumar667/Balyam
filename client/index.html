<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- BHALYAM brand icons. Source asset: /Bhalyam-logo.png (drop the file
         in client/public/ — Vite serves it at the root URL). -->
    <link rel="icon" type="image/png" href="/Bhalyam-logo.png" />
    <link rel="apple-touch-icon" href="/Bhalyam-logo.png" />
    <meta name="theme-color" content="#6D4323" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>BHALYAM · బాల్యం — Relive Childhood</title>
    <meta name="description" content="The digital veranda for 90s Telugu kids. Replay Hand Cricket, Snakes &amp; Ladders, Ludo, Rummy, and Rock-Paper-Scissors with your school crew on your phone." />

    <!-- Open Graph / WhatsApp share preview -->
    <meta property="og:title" content="BHALYAM · బాల్యం" />
    <meta property="og:description" content="Relive childhood. Hand Cricket, Ludo, Snakes &amp; Ladders, Rummy — for 90s Telugu kids." />
    <meta property="og:image" content="/Bhalyam-logo.png" />
    <meta property="og:type" content="website" />

    <!-- BHALYAM type system: Poppins (body), Righteous (display headline),
         Caveat (handwritten nostalgia accent). Preconnect speeds up the
         font-stylesheet fetch on the first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Righteous&family=Caveat:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-slate-900 text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
